  :root {

    --surface: #FFFFFF;
    --surface-2: #F4F2EA;
    --ink: #0E0E0C;
    --ink-2: #4A4A40;
    --ink-3: #6F6E60;
    --mute: #A6A39A;
    --border: #E8E5DC;
    --border-2: #D6D2C5;
    --accent: #15803D;
    --accent-soft: #E0F2E3;
    --accent-ink: #0F5E2C;
    --highlight: #E5532A;
    --highlight-soft: #FBE9DF;
    --warn: #B58513;
    --warn-soft: #FBF0D6;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Onest', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'ss01' on;
  }

  .font-display { font-family: 'Instrument Serif', Georgia, serif; }
  .font-body { font-family: 'Onest', system-ui, sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' on; }

  h1, h2, h3, h4 { letter-spacing: -0.01em; font-family: 'Onest', system-ui, sans-serif; }
  h1 { letter-spacing: -0.025em; }

  .text-ink { color: var(--ink); }
  .text-ink-2 { color: var(--ink-2); }
  .text-ink-3 { color: var(--ink-3); }
  .text-mute { color: var(--mute); }
  .text-accent { color: var(--accent); }
  .text-accent-ink { color: var(--accent-ink); }
  .text-highlight { color: var(--highlight); }

  .bg-surface { background: var(--surface); }
  .bg-surface-2 { background: var(--surface-2); }
  .bg-accent { background: var(--accent); }
  .bg-accent-soft { background: var(--accent-soft); }
  .bg-highlight-soft { background: var(--highlight-soft); }
  .bg-warn-soft { background: var(--warn-soft); }

  .border-line { border-color: var(--border); }
  .border-line-2 { border-color: var(--border-2); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    font-size: 14px;
    font-family: 'Onest', sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    border-radius: 10px;
    border: 1px solid transparent;
    padding: 11px 18px;
    line-height: 1;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--surface);
  }
  .btn-primary:hover { background: var(--accent-ink); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-accent {
    background: var(--accent);
    color: white;
  }
  .btn-accent:hover { background: var(--accent-ink); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border-color: var(--border-2);
  }
  .btn-secondary:hover { background: var(--surface-2); border-color: var(--ink-3); }
  .btn-ghost {
    background: transparent;
    color: var(--ink-2);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--ink); background: var(--surface-2); }

  /* Cards */
  .surface {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .surface-2 {
    background: var(--surface-2);
    border-radius: 14px;
  }

  /* Likert button */
  .likert-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-2);
    padding: 12px 8px;
    font-size: 12px;
    font-family: 'Onest', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    line-height: 1.3;
    border-radius: 10px;
  }
  .likert-btn:hover { border-color: var(--ink-3); background: var(--surface-2); }
  .likert-btn.selected {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }

  /* Pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Onest', sans-serif;
    line-height: 1.3;
  }
  .pill-accent { background: var(--accent-soft); color: var(--accent-ink); }
  .pill-highlight { background: var(--highlight-soft); color: var(--highlight); }
  .pill-warn { background: var(--warn-soft); color: var(--warn); }
  .pill-mute { background: var(--surface-2); color: var(--ink-2); }
  .pill-outline { border: 1px solid var(--border-2); color: var(--ink-2); }

  /* Slider */
  .slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--surface);
    box-shadow: 0 0 0 1px var(--border-2);
  }
  .slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--surface);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeIn 0.4s ease-out both; }

  @keyframes jFadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes jpulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Label */
  .label {
    font-family: 'Onest', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mute);
  }

  /* Hover */
  .hover-lift { transition: all 0.2s ease; }
  .hover-lift:hover { transform: translateY(-1px); border-color: var(--ink-3); }

  /* Selected ring */
  .ring-ink {
    border-color: var(--ink);
    box-shadow: 0 0 0 1px var(--ink);
  }

  /* Tabular numbers */
  .nums { font-variant-numeric: tabular-nums; }

  /* Bars chart */
  .bar-track { background: var(--surface-2); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s cubic-bezier(.4,.0,.2,1); }

  /* Dotted divider */
  .dotted-line {
    background-image: linear-gradient(to right, var(--border-2) 50%, transparent 50%);
    background-size: 8px 1px;
    background-repeat: repeat-x;
    height: 1px;
  }

  /* Map path */
  .map-stop {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: all 0.2s ease;
  }
  .map-stop:hover { border-color: var(--ink-3); }
  .map-stop.current { background: var(--ink); color: var(--surface); border-color: var(--ink); }

  /* Print */
  @media print {
    .no-print { display: none !important; }
    .surface { break-inside: avoid; }
    body { background: white; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .surface { border-radius: 12px; }
  }
</style>

function rawToStanine(raw) {
  const normalized = (raw - 3) / 15;
  const s = Math.round(normalized * 8 + 1);
  return Math.max(1, Math.min(9, s));
}

function computePersonality(answers) {
  const sums = {};
  IDENTYFI_QUESTIONS.forEach((q, i) => {
    const v = answers[i];
    if (v === undefined) return;
    sums[q.d] = (sums[q.d] || 0) + v;
  });
  const result = {};
  DIMENSIONS.forEach(d => { result[d.id] = rawToStanine(sums[d.id] || 9); });
  return result;
}

function computeInterests(answers) {
  const result = {};
  INTEREST_AREAS.forEach((a, i) => { result[a.id] = answers[i] !== undefined ? answers[i] : 0; });
  return result;
}

function matchCareer(career, personality, interests) {
  let iScore = 0, iWeight = 0;
  Object.entries(career.areas).forEach(([k, w]) => {
    iScore += (interests[k] || 0) * w;
    iWeight += w;
  });
  iScore = iWeight > 0 ? iScore / iWeight : 0;

  let pDelta = 0, pCount = 0;
  Object.entries(career.traits).forEach(([k, ideal]) => {
    pDelta += Math.abs((personality[k] || 5) - ideal);
    pCount += 1;
  });
  const pScore = Math.max(0, 100 - (pCount > 0 ? pDelta / pCount : 4) * 14);

  return {
    overall: Math.round(iScore * 0.55 + pScore * 0.45),
    interest: Math.round(iScore),
    personality: Math.round(pScore),
  };
}

function rankCareers(personality, interests) {
  return CAREERS
    .map(c => ({ ...c, match: matchCareer(c, personality, interests) }))
    .sort((a, b) => b.match.overall - a.match.overall);
}

function topInterests(interests, n = 5) {
  return INTEREST_AREAS
    .map(a => ({ ...a, score: interests[a.id] || 0 }))
    .sort((a, b) => b.score - a.score)
    .slice(0, n);
}

function stanineLevel(s) {
  if (s <= 3) return { label: 'nizak', tone: 'low' };
  if (s <= 6) return { label: 'prosečan', tone: 'mid' };
  return { label: 'visok', tone: 'high' };
}

function formatRSD(n) {
  if (n >= 1000) return (n / 1000).toFixed(0) + 'k';
  return n.toString();
}

function formatSalaryRange(s) {
  return formatRSD(s.min) + '–' + formatRSD(s.max) + ' RSD';
}

function computeArchetype(personality, interests) {
  let best = ARCHETYPES[0];
  let bestScore = -Infinity;
  ARCHETYPES.forEach(a => {
    let traitScore = 0, traitW = 0;
    Object.entries(a.traits).forEach(([k, w]) => {
      traitScore += (personality[k] || 5) * w;
      traitW += w;
    });
    let interestScore = 0, interestW = 0;
    Object.entries(a.areas).forEach(([k, w]) => {
      interestScore += (interests[k] || 0) * w;
      interestW += w;
    });
    const tNorm = traitW > 0 ? (traitScore / traitW - 1) / 8 * 100 : 50;
    const iNorm = interestW > 0 ? interestScore / interestW : 0;
    const combined = tNorm * 0.35 + iNorm * 0.65;
    if (combined > bestScore) { bestScore = combined; best = a; }
  });
  return best;
}

function similarCareers(career, n = 3) {
  const others = CAREERS.filter(c => c.id !== career.id);
  const scored = others.map(o => {
    let dot = 0, magA = 0, magB = 0;
    const keys = new Set([...Object.keys(career.areas), ...Object.keys(o.areas)]);
    keys.forEach(k => {
      const a = career.areas[k] || 0;
      const b = o.areas[k] || 0;
      dot += a * b;
      magA += a * a;
      magB += b * b;
    });
    const sim = (magA && magB) ? dot / (Math.sqrt(magA) * Math.sqrt(magB)) : 0;
    return { ...o, sim };
  });
  return scored.sort((a, b) => b.sim - a.sim).slice(0, n);
}

function explainMatch(career, personality, interests) {
  // WHY — top matching interest + top matching trait
  const matchingAreas = Object.entries(career.areas)
    .map(([k, w]) => ({ k, w, score: (interests[k] || 0) }))
    .filter(x => x.score >= 60)
    .sort((a, b) => b.score * b.w - a.score * a.w);

  const strongTraits = Object.entries(career.traits)
    .map(([k, ideal]) => ({ k, ideal, delta: (personality[k] || 5) - ideal }))
    .filter(x => x.delta >= -1 && x.ideal >= 6)
    .sort((a, b) => b.ideal - a.ideal);

  let why;
  if (matchingAreas.length > 0) {
    const area = INTEREST_AREAS.find(a => a.id === matchingAreas[0].k);
    if (strongTraits.length > 0) {
      const dim = DIMENSIONS.find(d => d.id === strongTraits[0].k);
      why = 'Interesovanje za „' + area.label.toLowerCase() + '" + jaka ' + dim.label.toLowerCase() + ' — oboje se ovde dobro uklapaju.';
    } else {
      why = 'Imaš jako interesovanje za „' + area.label.toLowerCase() + '", a ovo zanimanje je tačno u toj oblasti.';
    }
  } else if (strongTraits.length > 0) {
    const dim = DIMENSIONS.find(d => d.id === strongTraits[0].k);
    why = 'Tvoja ' + dim.label.toLowerCase() + ' se uklapa sa načinom rada u ovom zanimanju.';
  } else {
    why = 'Profil ti se umereno uklapa sa ovom karijerom — vredi je istražiti.';
  }

  // CHALLENGE — weakest trait + lifestyle red flag
  const weakTraits = Object.entries(career.traits)
    .map(([k, ideal]) => ({ k, ideal, delta: ideal - (personality[k] || 5) }))
    .filter(x => x.delta >= 2)
    .sort((a, b) => b.delta - a.delta);

  let challenge;
  if (weakTraits.length > 0) {
    const dim = DIMENSIONS.find(d => d.id === weakTraits[0].k);
    challenge = 'Ovo zanimanje često traži višu ' + dim.label.toLowerCase() + ', a ti si trenutno na nižem nivou — vredi razviti.';
  } else if (career.lifestyle.some(l => l.toLowerCase().includes('smen') || l.toLowerCase().includes('noćn'))) {
    challenge = 'Posao često uključuje smenski ili noćni rad — proveri da li ti to odgovara.';
  } else if (career.lifestyle.some(l => l.toLowerCase().includes('fizič'))) {
    challenge = 'Posao može biti fizički zahtevan tokom dužeg vremena.';
  } else if (career.lifestyle.some(l => l.toLowerCase().includes('vikend'))) {
    challenge = 'Vikend rad je čest u ovoj profesiji.';
  } else if (career.market.competition >= 8) {
    challenge = 'Konkurencija je značajna (' + career.market.competition + ' kandidata po oglasu) — portfolio i mreža kontakata su važni.';
  } else {
    challenge = 'Nema posebnih signala za pažnju — što ne znači da je sve lako.';
  }

  // NEXT — concrete first step
  const next = career.mapStages.now && career.mapStages.now[0] ? career.mapStages.now[0] : 'Pročitaj pun opis zanimanja na Startuj.';

  return { why, challenge, next };
}

function ProgressBar({ value, max }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div className="mb-10">
      <div className="flex items-end justify-between mb-2">
        <span className="label">napredak</span>
        <span className="text-xs font-mono text-ink-2 nums">{value} / {max}</span>
      </div>
      <div className="h-[3px] w-full" style={{background: 'var(--border)'}}>
        <div className="h-full transition-all duration-300" style={{background: 'var(--ink)', width: pct + '%'}} />
      </div>
    </div>
  );
}

const QPP = 6;

function IdentyFiTest({ onComplete, onBack }) {
  const [answers, setAnswers] = useState({});
  const [page, setPage] = useState(0);
  const totalPages = Math.ceil(IDENTYFI_QUESTIONS.length / QPP);
  const startIdx = page * QPP;
  const pageQuestions = IDENTYFI_QUESTIONS.slice(startIdx, startIdx + QPP);
  const pageComplete = pageQuestions.every((_, i) => answers[startIdx + i] !== undefined);
  const answeredCount = Object.keys(answers).length;

  return (
    <div className="max-w-3xl mx-auto px-6 md:px-12 pt-8 pb-24 animate-in" key={page}>
      <button onClick={onBack} className="btn btn-ghost mb-8 -ml-3">
        <Icon name="arrowLeft" size={14} /> Nazad na početak
      </button>

      <div className="label mb-3">Korak 1 od 2 · ko si ti?</div>
      <h2 className="text-3xl md:text-4xl font-medium mb-2" style={{letterSpacing: '-0.025em'}}>Reci koliko ti pristaje svaka tvrdnja.</h2>
      <p className="text-base text-ink-2 mb-10">Nema tačnih ni netačnih odgovora. Idi po prvom utisku.</p>

      <ProgressBar value={answeredCount} max={IDENTYFI_QUESTIONS.length} />

      <div className="space-y-8 mb-10">
        {pageQuestions.map((q, i) => {
          const qIdx = startIdx + i;
          return (
            <div key={qIdx} className="pb-6 border-b border-line">
              <p className="text-base mb-4">
                <span className="label mr-3 nums">{String(qIdx + 1).padStart(2, '0')}</span>
                {q.t}
              </p>
              <div className="grid grid-cols-6 gap-1.5">
                {LIKERT.map(opt => (
                  <button
                    key={opt.v}
                    onClick={() => setAnswers(a => ({...a, [qIdx]: opt.v}))}
                    className={'likert-btn' + (answers[qIdx] === opt.v ? ' selected' : '')}
                  >
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex items-center justify-between">
        <button onClick={() => setPage(p => Math.max(0, p - 1))} className="btn btn-secondary" disabled={page === 0}>
          <Icon name="arrowLeft" size={14} /> Prethodna
        </button>
        <span className="text-xs font-mono text-ink-3 nums">{page + 1} / {totalPages}</span>
        {page < totalPages - 1 ? (
          <button onClick={() => pageComplete && setPage(p => p + 1)} className="btn btn-primary" disabled={!pageComplete}>
            Sledeća <Icon name="arrow" size={14} />
          </button>
        ) : (
          <button onClick={() => pageComplete && onComplete(computePersonality(answers))} className="btn btn-accent" disabled={!pageComplete}>
            Dalje na interesovanja <Icon name="arrow" size={14} />
          </button>
        )}
      </div>
    </div>
  );
}

function ActionPlan({ career }) {
  const [checked, setChecked] = useState({});

  const now = career.mapStages.now || [];
  const explore = career.mapStages.explore || [];
  const learn = career.mapStages.learn || [];
  const first = career.mapStages.first || [];

  const buckets = [
    { period: '30 dana', sub: 'sledeći mesec', items: [...now, ...explore.slice(0, 1)], color: 'var(--accent)' },
    { period: '90 dana', sub: 'do tri meseca', items: [...explore.slice(1), ...learn.slice(0, 1)], color: 'var(--ink)' },
    { period: '365 dana', sub: 'sledeća godina', items: [...learn.slice(1), ...first.slice(0, 1)], color: 'var(--ink-2)' },
  ];

  const allItems = buckets.flatMap(b => b.items);
  const completedCount = Object.values(checked).filter(Boolean).length;
  const pct = allItems.length > 0 ? (completedCount / allItems.length) * 100 : 0;

  return (
    <div className="surface p-7">
      <div className="flex items-baseline justify-between mb-2 flex-wrap gap-2">

          <div className="label mb-1">Akcioni plan · {career.name.toLowerCase()}</div>

      </div>
      {/* Progress bar */}
      <div className="bar-track h-1 mb-6">
        <div className="bar-fill" style={{background: 'var(--accent)', width: pct + '%'}}></div>
      </div>

      <div className="grid md:grid-cols-3 gap-3">
        {buckets.map((b, bi) => (
          <div key={b.period} className="p-5 rounded-2xl" style={{background: 'var(--surface-2)'}}>
            <div className="mb-4">
              <h4 className="font-display italic text-3xl leading-none" style={{color: b.color}}>{b.period}</h4>
              <div className="label mt-2">{b.sub}</div>
            </div>
            <div className="space-y-2">
              {b.items.length === 0 && <p className="text-xs text-ink-3 italic py-2">— nema dodatnih koraka —</p>}
              {b.items.map((item, i) => {
                const key = bi + '-' + i;
                const done = checked[key];
                return (
                  <button key={i} onClick={() => setChecked(c => ({...c, [key]: !c[key]}))}
                          className="w-full text-left flex gap-3 p-3 rounded-lg transition-all"
                          style={{
                            background: done ? 'var(--accent-soft)' : 'var(--surface)',
                            border: '1px solid ' + (done ? 'var(--accent)' : 'var(--border)'),
                            cursor: 'pointer',
                          }}>
                    <div className="w-4 h-4 mt-0.5 flex-shrink-0 rounded flex items-center justify-center"
                         style={{
                           background: done ? 'var(--accent)' : 'transparent',
                           border: '1.5px solid ' + (done ? 'var(--accent)' : 'var(--border-2)'),
                         }}>
                      {done && <Icon name="check" size={10} className="text-white" />}
                    </div>
                    <span className="text-sm leading-relaxed" style={{
                      textDecoration: done ? 'line-through' : 'none',
                      color: done ? 'var(--accent-ink)' : 'var(--ink-2)',

      <p className="text-xs text-ink-3 mt-5 leading-relaxed">
        Lista koraka je polazna preporuka, ne odluka. Označi šta si uradio/la — možeš se vratiti kasnije i nastaviti.

function useCountUp(target, duration = 1200) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    let raf;
    const start = Date.now();
    const tick = () => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setValue(Math.round(target * eased));
      if (progress < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return value;
}

function SerbiaMap({ cities, accent = '#FCDE5A', maxSize = 50 }) {
  const mappable = cities.filter(c => CITY_COORDS[c.city]);
  const maxShare = mappable.length > 0 ? Math.max(...mappable.map(c => c.share || 1)) : 1;

  return (
    <svg viewBox="0 0 400 500" className="w-full h-auto" style={{maxWidth: '420px'}}>
      {/* Serbia outline (real geographic shape, includes Kosovo i Metohija) */}
      <path
        d={SERBIA_OUTLINE_PATH}
        fill="rgba(255,255,255,0.06)"
        stroke="rgba(255,255,255,0.45)"
        strokeWidth="1.5"
        strokeLinejoin="round"
        strokeLinecap="round"
      />

      {/* Cities — smallest first, largest on top */}
      {[...mappable]
        .sort((a, b) => (a.share || 0) - (b.share || 0))
        .map((c, i) => {
          const coords = CITY_COORDS[c.city];

          return (
            <g key={c.city} style={{ animation: 'jFadeUp 0.6s ease-out ' + (0.1 + i * 0.1) + 's both' }}>
              <circle cx={coords.x} cy={coords.y} r={radius} fill={accent} opacity="0.3" />

              <text

                y={coords.y - 2}
                fill="white"
                fontSize="13"
                fontFamily="Onest"
                fontWeight="600"

            </g>
          );
        })}
    </svg>
  );
}

function EmployerLogo({ name }) {
  const [imgError, setImgError] = useState(false);
  const domain = KNOWN_LOGOS[name];
  const logoUrl = domain ? 'https://logo.clearbit.com/' + domain + '?size=80' : null;

  // Generate consistent color from name hash
  const hash = name.split('').reduce((a, c) => ((a * 31) + c.charCodeAt(0)) | 0, 0);
  const hue = Math.abs(hash) % 360;
  const bg = 'hsl(' + hue + ', 45%, 50%)';

  const initials = name.replace(/[()]/g, '').split(/[\s\-+]+/).filter(w => w).slice(0, 2).map(w => w[0].toUpperCase()).join('');

  const showImage = logoUrl && !imgError;

  return (
    <div className="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0 overflow-hidden" style={{
      background: showImage ? 'white' : bg,
      border: showImage ? '1px solid var(--border)' : 'none',
      color: 'white',
    }}>
      {showImage ? (
        <img
          src={logoUrl}
          alt={name}
          className="w-full h-full object-contain"
          style={{padding: '6px'}}
          onError={() => setImgError(true)}
        />
      ) : (
        <span className="font-bold" style={{fontSize: '15px'}}>{initials || '·'}</span>
      )}
    </div>
  );
}

function lifestyleIcon(text) {
  const t = text.toLowerCase();
  if (t.includes('smen') || t.includes('noćn')) return 'clock';
  if (t.includes('fizič')) return 'building';
  if (t.includes('remot') || t.includes('hibri')) return 'spark';
  if (t.includes('vikend')) return 'clock';
  if (t.includes('ljud') || t.includes('socijal')) return 'user';
  if (t.includes('stab')) return 'check';
  if (t.includes('putovanj') || t.includes('teren')) return 'arrow';
  if (t.includes('kreativ')) return 'sparkles';
  if (t.includes('stres') || t.includes('pritisak') || t.includes('rok')) return 'spark';
  if (t.includes('plate') || t.includes('plata')) return 'coin';
  if (t.includes('standardno')) return 'clock';
  return 'dot';
}

function ResultsJourney({ personality, interests, onOpenDashboard }) {
  const [step, setStep] = useState(0);
  const ranked = useMemo(() => rankCareers(personality, interests), [personality, interests]);
  const archetype = useMemo(() => computeArchetype(personality, interests), [personality, interests]);
  const top3 = ranked.slice(0, 3);
  const [focusCareerId, setFocusCareerId] = useState(top3[0]?.id);
  const focusCareer = ranked.find(c => c.id === focusCareerId) || top3[0];

  const stepDefs = [
    { id: 'intro', el: <StepIntro onAuto={() => setStep(1)} /> },
    { id: 'archetype', el: <StepArchetype archetype={archetype} /> },
    { id: 'interests', el: <StepInterests interests={interests} /> },
    { id: 'strengths', el: <StepStrengths personality={personality} /> },
    { id: 'matches', el: <StepMatches top3={top3} onSelect={(id) => { setFocusCareerId(id); setStep(5); }} /> },
    { id: 'deepdive', el: <StepDeepDive career={focusCareer} personality={personality} interests={interests} /> },
    { id: 'salary', el: <StepSalary career={focusCareer} /> },
    { id: 'market', el: <StepMarket career={focusCareer} /> },
    { id: 'locations', el: <StepLocations career={focusCareer} /> },
    { id: 'employers', el: <StepEmployers career={focusCareer} /> },
    { id: 'lifestyle', el: <StepLifestyle career={focusCareer} /> },
    { id: 'plan30', el: <StepPlan30 career={focusCareer} /> },
    { id: 'plan90', el: <StepPlan90 career={focusCareer} /> },
    { id: 'plan365', el: <StepPlan365 career={focusCareer} /> },
    { id: 'outro', el: <StepOutro archetype={archetype} onOpen={onOpenDashboard} /> },
  ];
  const total = stepDefs.length;
  const isLast = step === total - 1;

  const next = () => { if (isLast) onOpenDashboard(); else setStep(s => Math.min(total - 1, s + 1)); };
  const prev = () => setStep(s => Math.max(0, s - 1));

  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); prev(); }
      else if (e.key === 'Escape') { e.preventDefault(); onOpenDashboard(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [step, isLast]);

  return (
    <div>
      <JourneyChrome step={step} total={total} onPrev={prev} onNext={next} onSkip={onOpenDashboard} isLast={isLast} />
      <div key={step}>{stepDefs[step].el}</div>
    </div>
  );
}

        <div className="flex items-baseline justify-between mb-4">
          <div className="label">Tvoji putevi</div>
          <div className="text-xs text-ink-3">Klikni da otvoriš detalje</div>
        </div>
        <div className="grid md:grid-cols-3 gap-3">
          {top3.map((c, i) => (
            <CareerCard key={c.id} career={c} rank={i + 1} selected={c.id === selectedId} onClick={() => setSelectedId(c.id)} />
          ))}
        </div>
        {mode === 'counselor' && top5.length > 3 && (
          <div className="mt-3 grid md:grid-cols-2 gap-3">
            {top5.slice(3).map((c, i) => (
              <CareerCard key={c.id} career={c} rank={i + 4} selected={c.id === selectedId} onClick={() => setSelectedId(c.id)} />
            ))}
          </div>
        )}
      </div>

      {/* Selected career — narrative description + CTAs */}
      <div className="surface p-8 mb-4">
        <div className="flex items-start justify-between gap-6 mb-6 flex-wrap">
          <div className="flex-1 min-w-0">
            <div className="label mb-2">o profesiji · {selected.name.toLowerCase()}</div>
            <h2 className="text-3xl md:text-4xl font-medium mb-3" style={{letterSpacing: '-0.025em'}}>
              {selected.name}
            </h2>
            <p className="text-base text-ink-2 leading-relaxed max-w-2xl mb-4">{selected.short}</p>
            <p className="text-sm text-ink-2 leading-relaxed max-w-2xl"><span className="font-medium">Svaki dan:</span> {selected.daily}</p>
          </div>
          <div className="flex flex-col gap-2 flex-shrink-0">
            <a href={startujCareerUrl(selected)} target="_blank" rel="noopener" className="btn btn-primary">
              <Icon name="book" size={14} /> Pun opis na Startuj <Icon name="external" size={12} />
            </a>
            <a href={poslovi_searchUrl(selected)} target="_blank" rel="noopener" className="btn btn-secondary">
              <Icon name="building" size={14} /> Otvoreni oglasi <Icon name="external" size={12} />
            </a>
            <a href={startuj_firstJobUrl(selected)} target="_blank" rel="noopener" className="btn btn-secondary">
              <Icon name="sparkles" size={14} /> Prvi posao <Icon name="external" size={12} />
            </a>
          </div>
        </div>

        <div className="pt-6 border-t border-line">
          <WhyChallengeNext career={selected} personality={personality} interests={interests} />
        </div>

        <div className="pt-6 mt-6 border-t border-line grid md:grid-cols-2 gap-6">
          <div>
            <div className="label mb-2">Obrazovni put</div>
            <p className="text-sm text-ink-2 leading-relaxed">{selected.education}</p>
          </div>
          <div>
            <div className="label mb-2">Vremenom</div>
            <p className="text-sm text-ink-2 leading-relaxed">{selected.growth}</p>
          </div>
        </div>

        <div className="pt-6 mt-6 border-t border-line">
          <SimilarCareersChips career={selected} ranked={ranked} onSelect={setSelectedId} />
        </div>
      </div>

      {/* Salary + Market */}
      <div className="grid md:grid-cols-2 gap-4 mb-4">
        <SalaryCard career={selected} />
        <MarketCard career={selected} />
      </div>

      {/* Employers + Lifestyle */}
      <div className="mb-4">
        <EmployersAndLifestyle career={selected} />
      </div>

      {/* Action plan 30/90/365 */}
      <div className="mb-10">
        <ActionPlan career={selected} />
      </div>

      {/* Personality + Interest panels */}
      <div className="mb-10">
        <div className="label mb-4">Tvoj profil</div>
        <div className="grid md:grid-cols-2 gap-4">
          <PersonalityPanel personality={personality} mode={mode} />
          <InterestPanel interests={interests} />
        </div>
      </div>

      {/* Counselor extras */}
      {mode === 'counselor' && (
        <div className="mb-10">
          <div className="label mb-4">Za savetnika / roditelja / psihologa</div>
          <CounselorPanel personality={personality} topCareers={ranked} />
        </div>
      )}

      {/* Footer / action bar */}
      <div className="surface p-6 flex items-center justify-between flex-wrap gap-4 no-print">
        <div>
          <div className="label mb-1">izvori</div>
          <div className="text-xs text-ink-2">
            Opisi sa <a href={startuj_descriptionsUrl()} target="_blank" rel="noopener" className="underline">Startuj Infostud</a> · plate i oglasi sa <a href="https://poslovi.infostud.com" target="_blank" rel="noopener" className="underline">Poslovi Infostud</a> · testovi: IdentyFi + WayFi
          </div>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={onReplayJourney} className="btn btn-secondary">
            <Icon name="sparkles" size={14} /> Ponovi putovanje
          </button>
          <button onClick={() => window.print()} className="btn btn-secondary">
            <Icon name="print" size={14} /> Štampa
          </button>
          <button onClick={onRestart} className="btn btn-secondary">
            <Icon name="refresh" size={14} /> Iznova
          </button>
        </div>
      </div>
    </div>
  );
}

// ================================================================
// === APP =========================================================
// ================================================================

const DEMO_PERSONALITY = {
  savesnost: 5, volja: 6, emotivna: 2, kontakti: 7, timski: 6, istrajnost: 2,
};

const DEMO_INTERESTS = {
  vozila: 10, metal: 15, ishrana: 25, hemija: 30, elektro: 10, priroda: 60,
  gradj_tehnika: 15, gradjevina: 10, drvo: 30, planiranje: 25, tekstil: 50,
  stampa: 35, logistika: 20, ugostiteljstvo: 45, informatika: 30, dizajn: 65,
  zdravlje: 90, kultura: 80, prodaja: 40, sport: 35, obrazovanje: 95, ekonomija: 20,
};

const STORAGE_KEY = 'karijerna-mapa-state-v2';

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed && parsed.personality && parsed.interests) return parsed;
    return null;
  } catch { return null; }
}

function App() {
  const [screen, setScreen] = useState('landing');
  const [personality, setPersonality] = useState(null);
  const [interests, setInterests] = useState(null);
  const [savedState, setSavedState] = useState(() => loadSavedState());

  // Persist whenever profile data changes
  useEffect(() => {
    if (personality && interests) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          personality, interests,
          screen: (screen === 'dashboard' || screen === 'journey') ? screen : 'dashboard',
          savedAt: Date.now(),
        }));
      } catch {}
    }
  }, [personality, interests, screen]);

  function reset() {
    setScreen('landing'); setPersonality(null); setInterests(null);
    setSavedState(null);
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    window.scrollTo(0, 0);
  }

  function resumeSaved() {
    if (!savedState) return;
    setPersonality(savedState.personality);
    setInterests(savedState.interests);
    setScreen(savedState.screen || 'dashboard');
  }

  useEffect(() => { window.scrollTo(0, 0); }, [screen]);

  if (screen === 'landing') {
    return <Landing
      onStart={() => setScreen('identyfi')}
      onUpload={() => setScreen('manual')}
      onDemo={() => { setPersonality(DEMO_PERSONALITY); setInterests(DEMO_INTERESTS); setScreen('journey'); }}
      savedState={savedState}
      onResume={resumeSaved}
      onClearSaved={() => { try { localStorage.removeItem(STORAGE_KEY); } catch {} setSavedState(null); }}
    />;
  }
  if (screen === 'identyfi') {
    return <IdentyFiTest onBack={() => setScreen('landing')} onComplete={(p) => { setPersonality(p); setScreen('wayfi'); }} />;
  }
  if (screen === 'wayfi') {
    return <WayFiTest onBack={() => setScreen('identyfi')} onComplete={(i) => { setInterests(i); setScreen('journey'); }} />;
  }
  if (screen === 'manual') {
    return <ManualEntry onBack={() => setScreen('landing')} onComplete={(p, i) => { setPersonality(p); setInterests(i); setScreen('journey'); }} />;
  }
  if (screen === 'journey' && personality && interests) {
    return <ResultsJourney personality={personality} interests={interests} onOpenDashboard={() => setScreen('dashboard')} />;
  }
  if (screen === 'dashboard' && personality && interests) {
    return <ResultsDashboard personality={personality} interests={interests} onRestart={reset} onReplayJourney={() => setScreen('journey')} />;
  }
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
